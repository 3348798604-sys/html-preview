<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML 预览</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden}
  body{background:#0F1419;color:#E6EDF3}

  /* —— 主屏：导入区 —— */
  .home{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    transition:opacity .3s;
  }
  .home.hidden{display:none}

  .dropzone{
    width:100%;
    max-width:560px;
    border:2px dashed #2A3441;
    border-radius:16px;
    padding:80px 40px;
    text-align:center;
    cursor:pointer;
    transition:all .2s;
    background:rgba(255,255,255,0.01);
  }
  .dropzone:hover,.dropzone.drag{
    border-color:#8FB3B0;
    background:rgba(143,179,176,0.05);
  }
  .dropzone .icon{
    font-size:48px;
    margin-bottom:24px;
    opacity:.6;
  }
  .dropzone h1{
    font-size:22px;
    font-weight:500;
    margin-bottom:12px;
    letter-spacing:0.05em;
  }
  .dropzone p{
    font-size:14px;
    color:#7D8590;
    line-height:1.7;
  }
  .dropzone .or{
    margin:20px 0 8px;
    color:#7D8590;
    font-size:12px;
    letter-spacing:0.2em;
  }
  .dropzone button{
    margin-top:12px;
    background:#5B7E7B;
    border:none;
    color:white;
    padding:10px 28px;
    border-radius:8px;
    font-size:14px;
    cursor:pointer;
    transition:all .15s;
  }
  .dropzone button:hover{background:#8FB3B0}
  #fileInput{display:none}

  /* 最近 */
  .recent{
    width:100%;
    max-width:560px;
    margin-top:32px;
  }
  .recent .title{
    font-size:11px;
    letter-spacing:0.2em;
    color:#7D8590;
    margin-bottom:12px;
    text-transform:uppercase;
  }
  .recent .item{
    display:flex;
    align-items:center;
    gap:12px;
    padding:14px 16px;
    background:#161B22;
    border:1px solid #2A3441;
    border-radius:10px;
    margin-bottom:8px;
    cursor:pointer;
    transition:all .15s;
  }
  .recent .item:hover{
    border-color:#5B7E7B;
    transform:translateX(2px);
  }
  .recent .item .name{
    flex:1;
    font-size:14px;
    color:#E6EDF3;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .recent .item .time{
    font-size:11px;
    color:#7D8590;
  }
  .recent .item .del{
    color:#7D8590;
    padding:4px 8px;
    border-radius:4px;
    font-size:14px;
  }
  .recent .item .del:hover{color:#A03E3A;background:rgba(160,62,58,0.1)}

  /* —— 预览屏：全屏 —— */
  .viewer{
    position:fixed;
    inset:0;
    background:#000;
    z-index:10;
    display:none;
  }
  .viewer.show{display:block}
  .viewer iframe{
    width:100%;
    height:100%;
    border:none;
    background:white;
  }

  /* 悬浮返回栏 */
  .topbar{
    position:fixed;
    top:0;
    left:0;
    right:0;
    height:48px;
    background:linear-gradient(180deg,rgba(15,20,25,0.95),rgba(15,20,25,0.7));
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    display:flex;
    align-items:center;
    padding:0 16px;
    gap:12px;
    z-index:11;
    transform:translateY(-100%);
    transition:transform .25s ease;
    pointer-events:none;
  }
  .topbar.visible{
    transform:translateY(0);
    pointer-events:auto;
  }
  .topbar button{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.12);
    color:#E6EDF3;
    padding:7px 14px;
    border-radius:8px;
    font-size:13px;
    cursor:pointer;
    transition:all .15s;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .topbar button:hover{
    background:rgba(143,179,176,0.2);
    border-color:#8FB3B0;
  }
  .topbar .filename{
    flex:1;
    font-size:13px;
    color:#7D8590;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    text-align:center;
  }
  .topbar .right-group{display:flex;gap:8px}

  /* 点击触发区 */
  .tap-zone{
    position:fixed;
    top:0;
    left:0;
    right:0;
    height:60px;
    z-index:9;
    cursor:pointer;
  }
  .tap-zone-full{
    position:fixed;
    inset:0;
    z-index:11;
    cursor:pointer;
    display:none;
  }
  .tap-zone-full.active{display:block}

  /* 主屏拖拽蒙层 */
  .drop-mask{
    position:fixed;
    inset:0;
    background:rgba(91,126,123,0.15);
    border:3px dashed #8FB3B0;
    z-index:99;
    display:none;
    align-items:center;
    justify-content:center;
    pointer-events:none;
  }
  .drop-mask.active{display:flex}
  .drop-mask .msg{
    font-size:20px;
    color:#8FB3B0;
    letter-spacing:0.1em;
  }
</style>
</head>
<body>

<!-- 主屏 -->
<div class="home" id="home">
  <div style="width:100%;max-width:560px">
    <div class="dropzone" id="dropzone">
      <div class="icon">⌘</div>
      <h1>HTML 预览</h1>
      <p>把 .html 文件拖到这里<br>或者选一个打开</p>
      <div class="or">— OR —</div>
      <button id="chooseBtn">选择文件</button>
      <input type="file" id="fileInput" accept=".html,.htm">
    </div>

    <div class="recent" id="recent" style="display:none">
      <div class="title">最近打开</div>
      <div id="recentList"></div>
    </div>
  </div>
</div>

<!-- 预览屏 -->
<div class="viewer" id="viewer">
  <iframe id="frame" sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-modals"></iframe>
  
  <!-- 顶部触发区（默认显示一个能点的小区域） -->
  <div class="tap-zone" id="tapZone"></div>
  
  <!-- 全屏触发区（顶栏显示时，点任何地方都能切换） -->
  <div class="tap-zone-full" id="tapZoneFull"></div>

  <!-- 顶栏 -->
  <div class="topbar" id="topbar">
    <button id="backBtn">← 返回</button>
    <div class="filename" id="filename"></div>
    <div class="right-group">
      <button id="reloadBtn">↻ 刷新</button>
      <button id="hideBtn">✕</button>
    </div>
  </div>
</div>

<!-- 拖拽蒙层 -->
<div class="drop-mask" id="dropMask">
  <div class="msg">松开就能打开</div>
</div>

<script>
const home = document.getElementById('home');
const viewer = document.getElementById('viewer');
const frame = document.getElementById('frame');
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const topbar = document.getElementById('topbar');
const tapZone = document.getElementById('tapZone');
const tapZoneFull = document.getElementById('tapZoneFull');
const filenameEl = document.getElementById('filename');
const dropMask = document.getElementById('dropMask');
const recentEl = document.getElementById('recent');
const recentList = document.getElementById('recentList');

const STORAGE_KEY = 'html_previewer_recent_v1';
const MAX_RECENT = 8;

// === 最近列表 ===
function loadRecent(){
  try{
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  }catch(e){return []}
}
function saveRecent(list){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
  }catch(e){
    // 容量满了，按从早到晚删
    while(list.length > 2){
      list.shift();
      try{
        localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
        break;
      }catch(_){}
    }
  }
}
function renderRecent(){
  const list = loadRecent();
  if(list.length === 0){recentEl.style.display='none'; return}
  recentEl.style.display='block';
  recentList.innerHTML = '';
  list.slice().reverse().forEach((item, idx)=>{
    const realIdx = list.length - 1 - idx;
    const div = document.createElement('div');
    div.className = 'item';
    const ago = formatTime(item.time);
    div.innerHTML = `
      <span class="name">${escapeHtml(item.name)}</span>
      <span class="time">${ago}</span>
      <span class="del" data-idx="${realIdx}">×</span>
    `;
    div.querySelector('.name').onclick = ()=>{
      openContent(item.content, item.name);
    };
    div.querySelector('.time').onclick = ()=>{
      openContent(item.content, item.name);
    };
    div.querySelector('.del').onclick = (e)=>{
      e.stopPropagation();
      const list = loadRecent();
      list.splice(realIdx, 1);
      saveRecent(list);
      renderRecent();
    };
    recentList.appendChild(div);
  });
}
function addRecent(name, content){
  const list = loadRecent();
  // 去重
  const exist = list.findIndex(x=>x.name===name);
  if(exist >= 0) list.splice(exist, 1);
  list.push({name, content, time: Date.now()});
  while(list.length > MAX_RECENT) list.shift();
  saveRecent(list);
  renderRecent();
}
function formatTime(t){
  const diff = Date.now() - t;
  if(diff < 60000) return '刚刚';
  if(diff < 3600000) return Math.floor(diff/60000)+'分钟前';
  if(diff < 86400000) return Math.floor(diff/3600000)+'小时前';
  return Math.floor(diff/86400000)+'天前';
}
function escapeHtml(s){
  return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

// === 打开 ===
function openContent(html, name){
  filenameEl.textContent = name || '';
  home.classList.add('hidden');
  viewer.classList.add('show');
  const doc = frame.contentDocument || frame.contentWindow.document;
  doc.open();
  doc.write(html);
  doc.close();
  // 短暂显示一次返回栏，提示用户
  showBar(true);
  setTimeout(()=>showBar(false), 2000);
}

function openFile(file){
  const reader = new FileReader();
  reader.onload = e=>{
    const content = e.target.result;
    openContent(content, file.name);
    addRecent(file.name, content);
  };
  reader.readAsText(file);
}

// === 关闭 ===
function closeViewer(){
  viewer.classList.remove('show');
  home.classList.remove('hidden');
  const doc = frame.contentDocument || frame.contentWindow.document;
  doc.open(); doc.write(''); doc.close();
  showBar(false);
}

// === 顶栏显隐 ===
let barTimer = null;
function showBar(show){
  if(show){
    topbar.classList.add('visible');
    tapZoneFull.classList.add('active');
    clearTimeout(barTimer);
    barTimer = setTimeout(()=>showBar(false), 3000);
  }else{
    topbar.classList.remove('visible');
    tapZoneFull.classList.remove('active');
    clearTimeout(barTimer);
  }
}

// 顶部触发区点击
tapZone.addEventListener('click', ()=>showBar(true));
// 全屏触发区（顶栏显示时，点任何地方关掉）
tapZoneFull.addEventListener('click', (e)=>{
  // 只有点 topbar 之外才关
  if(!topbar.contains(e.target)){
    showBar(false);
  }
});

// 按钮
document.getElementById('backBtn').onclick = closeViewer;
document.getElementById('hideBtn').onclick = ()=>showBar(false);
document.getElementById('reloadBtn').onclick = ()=>{
  const list = loadRecent();
  const cur = list.find(x=>x.name===filenameEl.textContent);
  if(cur) openContent(cur.content, cur.name);
};

// 选择文件
document.getElementById('chooseBtn').onclick = (e)=>{e.stopPropagation(); fileInput.click();};
dropzone.onclick = ()=>fileInput.click();
fileInput.onchange = (e)=>{
  const f = e.target.files[0];
  if(f) openFile(f);
  fileInput.value='';
};

// 拖拽
let dragCounter = 0;
window.addEventListener('dragenter',(e)=>{
  e.preventDefault();
  dragCounter++;
  if(!viewer.classList.contains('show')) dropMask.classList.add('active');
});
window.addEventListener('dragleave',()=>{
  dragCounter--;
  if(dragCounter<=0){dragCounter=0; dropMask.classList.remove('active');}
});
window.addEventListener('dragover',(e)=>e.preventDefault());
window.addEventListener('drop',(e)=>{
  e.preventDefault();
  dragCounter=0;
  dropMask.classList.remove('active');
  const f = e.dataTransfer.files[0];
  if(f && (f.name.endsWith('.html') || f.name.endsWith('.htm'))){
    openFile(f);
  }
});

// 键盘
document.addEventListener('keydown',(e)=>{
  if(e.key === 'Escape'){
    if(viewer.classList.contains('show')){
      if(topbar.classList.contains('visible')) showBar(false);
      else closeViewer();
    }
  }
});

// 初始
renderRecent();
</script>

</body>
</html>
